[build]
  base = "crewup_official_site"
  publish = "."
  command = """
if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
  echo 'Missing required Netlify env vars: SUPABASE_URL and/or SUPABASE_ANON_KEY'
  exit 1
fi
printf 'window.CREWUP_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_ANON_KEY: "%s"\n};\n' "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > config.js
"""

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200
